# GitHub Actions CI: runs automatically on every push once this repo is on GitHub.
# Think of it as a robot teammate that checks your work before it counts.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Sanity-check the app imports
        run: python -c "from app.main import app; print('backend imports OK')"
        working-directory: backend
      - name: Run tests
        run: pytest -v
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Type-check and build
        run: npm run build
        working-directory: frontend
